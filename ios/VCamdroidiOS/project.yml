name: VCamdroidiOS
options:
  bundleIdPrefix: com.darusc.vcamdroid
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  VCamdroidiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/VCamdroidiOS
    resources:
      - Sources/VCamdroidiOS/Resources
    info:
      path: Sources/VCamdroidiOS/Info.plist
      properties:
        CFBundleDisplayName: VCamdroid
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSCameraUsageDescription: VCamdroid uses the camera to stream video to your PC.
        NSMicrophoneUsageDescription: VCamdroid optionally streams microphone audio alongside video.
        NSLocalNetworkUsageDescription: VCamdroid advertises itself on the local network so the desktop client can discover it.
        NSBonjourServices:
          - _vcamdroid._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darusc.vcamdroid.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ENABLE_PREVIEWS: YES
  VCamdroidiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VCamdroidiOSTests
    dependencies:
      - target: VCamdroidiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darusc.vcamdroid.ios.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VCamdroidiOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VCamdroidiOS
schemes:
  VCamdroidiOS:
    build:
      targets:
        VCamdroidiOS: all
        VCamdroidiOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VCamdroidiOSTests
    archive:
      config: Release
