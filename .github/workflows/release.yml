name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Artifact version from tag
        id: meta
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/android-build
        with:
          version_suffix: ${{ steps.meta.outputs.ver }}

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Artifact version from tag
        id: meta
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/ios-build
        with:
          version_suffix: ${{ steps.meta.outputs.ver }}

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Artifact version from tag
        id: meta
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/windows-build
        with:
          version_suffix: ${{ steps.meta.outputs.ver }}

  release:
    needs: [build-android, build-ios, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VCamdroid ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/VCamdroid-Android-*.apk
            artifacts/VCamdroidiOS-*.ipa
            artifacts/VCamdroid-Windows-x64-*.zip
